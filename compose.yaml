services:
  server:
    build:
      context: .
    environment:
      NODE_ENV: production
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_iUSER}
      DB_PASS: ${DB_PASS}
      DB_HOST: ${DB_HOST}
      LTI_KEY: ${LTI_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PRODUCAO_VARIAVEL: ${PRODUCAO_VARIAVEL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BACK_LTI: ${BACK_LTI}
      NOME_FERRAMENTA: ${NOME_FERRAMENTA}
      BASE_URL_FILE: ${BASE_URL_FILE}
      URL_N8N_CONVERSA: ${URL_N8N_CONVERSA}
    ports:
      - "8002:8002"
    restart: always